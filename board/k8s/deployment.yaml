apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-deployment
  labels:
    app: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
      - name: devops-container
        image: 141964413005.dkr.ecr.us-east-1.amazonaws.com/devops-ecr:e356a7ce2559c392e592e5413029cc56bdd351ed
        ports:
        - containerPort: 8080
