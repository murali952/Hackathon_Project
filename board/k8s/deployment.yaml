apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hackathon-app
  template:
    metadata:
      labels:
        app: hackathon-app
    spec:
      containers:
      - name: hackathon-app
        image: 736722722555.dkr.ecr.ap-south-1.amazonaws.com/hackathon-app:4721b504d0b72402ea15bf7b2a12c6dffe3fc824
        ports:
        - containerPort: 8080
