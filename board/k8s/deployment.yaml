apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hackathon-app
  template:
    metadata:
      labels:
        app: hackathon-app
    spec:
      containers:
      - name: hackathon-app
        image: 362324310698.dkr.ecr.us-east-1.amazonaws.com/hackathon-app:latest
        ports:
        - containerPort: 8080
