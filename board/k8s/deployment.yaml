apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hackathon-app
  template:
    metadata:
      labels:
        app: hackathon-app
    spec:
      containers:
      - name: hackathon-app
        image: 736722722555.dkr.ecr.ap-south-1.amazonaws.com/hackathon-app:c708b56aa2594316ef83e97d80444368ec7eb07f
        ports:
        - containerPort: 8080
